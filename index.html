<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tema antes da recuperação</title>
</head>
<body>
    <header> <!--A header ela é usada para definir o cabeçalho de uma página ou de uma seção-->
        <h1>Nome da Aluna : Milena de Quadros</h1>
        <h4>Bom dia! Hoje você ira ver um trabalho de criação de sites.Espero que Goste</h4>
    </header>
    <selection> 
        <p> Eu <strong>ADORO </strong>cozinhar principalmente se for para minha Familía, gosto também de maquiar, porém algumas <em>makeups </em> são muito caras </p>
        <!--O <p> é usado para escrever um parágrafo. O <strong> Deixa o deixa o texto em negrito e mostra importância; Já o <em> também deixa em negrito pórem serve apenas para dar ênfase na frase oun plavra  -->
    </selection>
    <main><!--Aonde fica o connteúdo mais importante(principal) da página-->
    <form><!--Agrupa os campos do formulario-->
    <fieldset><!--Contorna (agrupa) um grupo do formulário-->
        <legend><!--Legenda que fica entre o fieldset e ela é o título da moldura  -->
        Formulário</legend>
        
                <label for="email">Email</label><!--Local que coloca o nome dos input e o for é o nome que eu estou dando para o label-->
                <input type="email" name="email" id="email"><!--Input é o campo aonde o usuário pode inserir indormações. O id É um identificador único para cada bolinha, ele liga o texto(label) ao clique.O for,é o texto descritivo, e deve ser igual ao id do input, e isso permite que ao clicar sobre a bolinha seja marcada-->
               <p>Área de Interesses</p>
                <input type="radio" id="front" name="area" value="Front-end">
                <label for="Front">Front-end </label>
                <input type="radio" id="back" name="area" value="Back-end">
                <label for="back">Back-end</label> 
                <input type="radio" id="full" name="area" value="Full-stack">
                <label for="full">Full-stack</label>
                <p>Hablidades:</p>
                <input type="checkbox" id="html" name="habilidades" value="HTML">
                <label for="html">HTML</label>
                <input type="checkbox" id="c" name="habilidades" value="C">
                <label for="c">C</label>
                <input type="checkbox" id="git" name="habilidades" value="Git">
                <label for="gitl">Git</label>
                <input type="checkbox" id="rede" name="habilidades" value="Rede">
                <label for="rede">Rede</label>
                <button type="submit">Enviar Formulário</button><!--Dispara o envio dos dados-->
                 
    </fieldset>
    </form>
    
    </main>

    <section><!--Agrupa conteúdos que tem o mesmo tema-->
        <figure>
             <img src="Cachorro.jpg" alt="Cachorrinho em uma caixa"><!--Insere a imagem-->
        </figure><!--envolve um conteúdo que é uma ilustração-->
    </section>
   
</body>
</html>
